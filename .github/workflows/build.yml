-name: Build Docker image
run: docker build -t cpp-demo .

on:
  push:
  pull_request:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y g++ make

    - name: Build
      run: make build

    - name: Run tests
      run: make run