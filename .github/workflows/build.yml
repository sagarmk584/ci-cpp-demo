name: C++ Build Test

on:
  push:
  pull_request:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install compiler
      run: |
        sudo apt update
        sudo apt install -y g++

    - name: Build
      run: make build

    - name: Run tests
      run: make run